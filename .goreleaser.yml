version: 2

project_name: go-monitor

builds:
  - id: go-monitor
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    goamd64:
      - v3
    binary: go-monitor
    env:
      - CGO_ENABLED=0

nfpms:
  - id: go-monitor
    package_name: go-monitor
    maintainer: lyj <lyj404@qq.com>
    homepage: https://github.com/lyj404/go-monitor
    description: Linux system resource monitor with web dashboard
    license: Apache-2.0
    section: utils
    priority: optional
    dependencies:
      - libc6
    bindir: /usr/bin
    contents:
      - src: debian/go-monitor.service
        dst: lib/systemd/system/go-monitor.service
      - src: config.example.yaml
        dst: etc/go-monitor/config.yaml
    scripts:
      postinst: debian/postinst
      prerm: debian/prerm

archives:
  - id: go-monitor
    builds:
      - go-monitor
    format: tar.gz

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: lyj404
    name: go-monitor
  draft: true